    sdk: flutter
  google_maps_flutter: ^2.5.0
  geolocator: ^14.0.0
  permission_handler: ^12.0.0
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  firebase_app_check: ^0.3.2
  cloud_firestore: ^5.6.7
